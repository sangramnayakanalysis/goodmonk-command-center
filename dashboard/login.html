<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in · GoodMonk Command Center</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="brand">
        <div class="glyph">GM</div>
        <div>
          <div class="title">GoodMonk</div>
          <div class="sub">Command Center</div>
        </div>
      </div>
      <h1>Operations sign-in</h1>
      <p class="tag">Monitor · Detect · Alert · Optimize</p>

      <div class="field">
        <label for="username">Username</label>
        <input id="username" type="text" autocomplete="username" autofocus />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" />
      </div>
      <button class="btn-primary" id="loginBtn">Sign in</button>
      <div class="login-err" id="err"></div>
    </div>
  </div>
  <script src="auth.js"></script>
  <script>
    document.getElementById('loginBtn').addEventListener('click', doLogin);
    document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    document.getElementById('username').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

    function doLogin() {
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;
      const err = document.getElementById('err');
      if (Auth.login(u, p)) {
        window.location.href = 'index.html';
      } else {
        err.textContent = 'Incorrect username or password.';
        document.getElementById('password').value = '';
      }
    }
    // If already signed in, skip straight to the dashboard.
    if (Auth.isAuthed()) window.location.href = 'index.html';
  </script>
</body>
</html>
