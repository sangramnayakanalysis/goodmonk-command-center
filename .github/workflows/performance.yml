name: GoodMonk Performance

# System 2 — PageSpeed Insights diagnostics. Runs hourly.
on:
  schedule:
    - cron: "5 * * * *"     # hourly, offset 5 min from the 15-min job
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: goodmonk-performance
  cancel-in-progress: false

jobs:
  performance:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GM_BASE_URL: ${{ secrets.GM_BASE_URL }}
      PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
      GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      ALERT_RECIPIENTS: ${{ secrets.ALERT_RECIPIENTS }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        working-directory: monitoring
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run PageSpeed diagnostics
        working-directory: monitoring
        run: python run_performance.py

      - name: Regenerate dashboard JSON
        working-directory: monitoring
        run: python json_generator.py

      - name: Commit refreshed data
        run: |
          git config user.name  "goodmonk-bot"
          git config user.email "goodmonk-bot@users.noreply.github.com"
          git add dashboard/data
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "chore: performance run $(date -u +'%Y-%m-%dT%H:%MZ')"
            git push
          fi
